sites:
  blog:
    title: Siarhei's Blog
    slug: /
    theme: docs
    baseUrl: https://docs.example.com
    description: Documentation for my project.
deploy:
  default: cloudflare
build:
  output: dist
  cleanUrls: true
  assetsDir: images
validation:
  brokenLinks: error
  brokenAnchors: error
  invalidFrontmatter: error
  missingFrontmatter: warn
  treeOrphan: info
  treeBrokenRef: error
  treeDuplicateRef: warn
  treeMalformed: error
  unknownFrontmatterKeys: warn
