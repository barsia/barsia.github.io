name: Deploy blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Pin the Codocation CLI version. Bump this to upgrade.
  # Must match a tag in https://github.com/codocation/codocation/releases
  CLI_TAG: cli-v0.1.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Codocation CLI
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.CLI_TAG }}
        run: |
          set -e
          mkdir -p .tools
          gh release download "$TAG" \
            -R codocation/codocation \
            -p codocation-cli \
            -D .tools
          chmod +x .tools/codocation-cli
          ls -la .tools

      - name: Generate site
        run: |
          set -e
          .tools/codocation-cli build "$GITHUB_WORKSPACE" --out _site
          test -d _site || { echo "site not generated at _site"; exit 1; }
          ls -la _site | head

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
