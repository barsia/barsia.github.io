name: Deploy blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Pin the Codocation CLI version. Bump this to upgrade.
  # Must match a tag in https://github.com/codocation/codocation/releases
  CLI_TAG: cli-v0.1.0
  INSTANCE_ID: blog

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download codocation-cli.jar
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.CLI_TAG }}
        run: |
          set -e
          mkdir -p .tools
          gh release download "$TAG" \
            -R codocation/codocation \
            -p codocation-cli.jar \
            -D .tools
          ls -la .tools

      - name: Generate site
        env:
          INSTANCE: ${{ env.INSTANCE_ID }}
        run: |
          set -e
          java -jar .tools/codocation-cli.jar \
            -f zip \
            -c "$GITHUB_WORKSPACE/codocation.xml" \
            -i "$INSTANCE" \
            -o build
          ZIP="build/${INSTANCE}/${INSTANCE}.zip"
          test -f "$ZIP" || { echo "Expected zip not found: $ZIP"; ls -R build; exit 1; }
          mkdir -p _site
          unzip -q "$ZIP" -d _site
          ls -la _site | head

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
